<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* admin-only extra styles, kept separate so style.css stays untouched */
    .admin-wrap { max-width: 720px; margin: 0 auto; padding: 7rem 2rem 5rem; }
    .admin-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .admin-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      margin-bottom: 1.2rem;
    }
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.5px;
    }
    .field input, .field textarea {
      width: 100%;
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: var(--frost-white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
    }
    .field input:focus, .field textarea:focus {
      outline: none;
      border-color: var(--teal);
    }
    .field textarea { resize: vertical; min-height: 80px; }
    .field-row { display: flex; gap: 1rem; }
    .field-row .field { flex: 1; }

    .btn-admin {
      background: var(--teal);
      color: var(--navy);
      font-weight: 600;
      padding: 0.7rem 1.6rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      transition: transform 0.2s ease;
    }
    .btn-admin:hover { transform: translateY(-2px); }
    .btn-admin.secondary {
      background: transparent;
      border: 1.5px solid var(--teal);
      color: var(--teal);
    }
    .btn-admin.danger {
      background: transparent;
      border: 1.5px solid #e85d5d;
      color: #e85d5d;
    }

    .status-msg { font-size: 0.85rem; margin-top: 0.8rem; }
    .status-msg.success { color: var(--teal); }
    .status-msg.error { color: #e85d5d; }

    .admin-project-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }
    .admin-project-row:last-child { border-bottom: none; }
    .admin-project-info { flex: 1; }
    .admin-project-info strong { display: block; color: var(--frost-white); }
    .admin-project-info span { font-size: 0.8rem; color: var(--text-muted); }
    .admin-project-actions { display: flex; gap: 0.6rem; flex-shrink: 0; }
    .admin-project-actions button { font-size: 0.8rem; padding: 0.4rem 0.9rem; }

    #loginScreen { display: flex; min-height: 100vh; align-items: center; justify-content: center; }
    #adminPanel { display: none; }
  </style>
</head>
<body>

  <!-- ========== LOGIN SCREEN ========== -->
  <div id="loginScreen">
    <div class="admin-card" style="width: 360px;">
      <h2>✦ admin login</h2>
      <div class="field">
        <label for="loginEmail">email</label>
        <input type="email" id="loginEmail" placeholder="you@email.com">
      </div>
      <div class="field">
        <label for="loginPassword">password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="btn-admin" id="loginBtn" style="width: 100%;">log in</button>
      <p class="status-msg" id="loginStatus"></p>
    </div>
  </div>

  <!-- ========== ADMIN PANEL ========== -->
  <div id="adminPanel">
    <nav class="navbar">
      <div class="nav-logo"><span class="logo-text">admin</span></div>
      <button class="btn-admin secondary" id="logoutBtn">log out</button>
    </nav>

    <div class="admin-wrap">

      <!-- ADD / EDIT FORM -->
      <div class="admin-card">
        <h2 id="formTitle">✦ add a new project</h2>
        <form id="projectForm">
          <input type="hidden" id="projectId">

          <div class="field">
            <label for="title">title</label>
            <input type="text" id="title" required>
          </div>

          <div class="field">
            <label for="description">description</label>
            <textarea id="description" required></textarea>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="type">type</label>
              <input type="text" id="type" placeholder="uni project / personal" required>
            </div>
            <div class="field">
              <label for="year">year</label>
              <input type="text" id="year" placeholder="2025" required>
            </div>
          </div>

          <div class="field">
            <label for="techTags">tech tags (comma separated)</label>
            <input type="text" id="techTags" placeholder="HTML, CSS, JavaScript">
          </div>

          <div class="field-row">
            <div class="field">
              <label for="liveLink">live link (optional)</label>
              <input type="url" id="liveLink" placeholder="https://...">
            </div>
            <div class="field">
              <label for="githubLink">github link (optional)</label>
              <input type="url" id="githubLink" placeholder="https://...">
            </div>
          </div>

          <button type="submit" class="btn-admin" id="saveBtn">save project</button>
          <button type="button" class="btn-admin secondary" id="cancelEditBtn" style="display:none;">cancel edit</button>
          <p class="status-msg" id="formStatus"></p>
        </form>
      </div>

      <!-- EXISTING PROJECTS LIST -->
      <div class="admin-card">
        <h2>✦ your projects</h2>
        <div id="adminProjectsList">
          <p style="color: var(--text-muted); font-size: 0.9rem;">loading...</p>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
